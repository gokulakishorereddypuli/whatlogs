<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; min-height: 100vh; display: flex; align-items: center; }
        .auth-card { border-radius: 12px; border: none; }
        .canvas-box {
            background: #fff;
            padding: 8px;
            border: 2px solid #ced4da;
            border-radius: 8px;
            display: inline-flex;
            align-items: center;
            overflow: hidden;
        }
        #captchaCanvas { border-radius: 4px; flex: 1; min-width: 0; max-width: calc(100% - 48px); display: block; }
        .refresh-btn { cursor: pointer; color: #0d6efd; font-size: 1.5rem; transition: 0.3s; flex-shrink: 0; white-space: nowrap; }
        .refresh-btn:hover { color: #0a58ca; transform: rotate(90deg); }
    </style>
</head>
<body>

<!-- Auth Panel -->
<div class="container" id="authPanel">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card auth-card shadow">
                <div class="card-body p-4">
                    <h4 class="text-center mb-4 fw-bold">Secure Access</h4>

                    <!-- Tab Navigation -->
                    <ul class="nav nav-tabs mb-4" id="authTabs">
                        <li class="nav-item w-50 text-center">
                            <a class="nav-link active fw-bold" id="loginTab" href="#" onclick="showTab('login'); return false;">Login</a>
                        </li>
                        <li class="nav-item w-50 text-center">
                            <a class="nav-link fw-bold" id="signupTab" href="#" onclick="showTab('signup'); return false;">Sign Up</a>
                        </li>
                    </ul>

                    <!-- Login Form -->
                    <form id="loginForm">
                        <div class="mb-3">
                            <input type="text" id="loginUsername" class="form-control" placeholder="Username" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" id="loginPassword" class="form-control" placeholder="Password" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label small fw-bold text-secondary">Verify Identity</label>
                            <div class="canvas-box w-100 justify-content-between mb-2">
                                <canvas id="captchaCanvas" width="200" height="60"></canvas>
                                <span class="refresh-btn px-2" onclick="generateCaptcha()" title="Refresh Code">&#x21bb;</span>
                            </div>
                            <input type="text" id="captchaInput" class="form-control form-control-lg text-center"
                                   placeholder="Enter the code" maxlength="6" autocomplete="off" required>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Sign In</button>
                        <div id="loginFeedback" class="text-center mt-3 small fw-bold"></div>
                    </form>

                    <!-- Signup Form -->
                    <form id="signupForm" style="display:none;">
                        <div class="mb-3">
                            <input type="text" id="signupUsername" class="form-control" placeholder="Username" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" id="signupPassword" class="form-control" placeholder="Password" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" id="signupConfirm" class="form-control" placeholder="Confirm Password" required>
                        </div>

                        <button type="submit" class="btn btn-success w-100 fw-bold py-2">Create Account</button>
                        <div id="signupFeedback" class="text-center mt-3 small fw-bold"></div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

<!-- Welcome Panel (regular users after login) -->
<div class="container" id="welcomePanel" style="display:none;">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="card auth-card shadow">
                <div class="card-body p-4 text-center">
                    <h4 class="fw-bold mb-3">Welcome, <span id="welcomeUsername"></span>!</h4>
                    <p class="text-muted">You have successfully logged in.</p>
                    <button class="btn btn-outline-secondary w-100 fw-bold" onclick="logout()">Logout</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Admin Panel -->
<div class="container-fluid" id="adminPanel" style="display:none;">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-7">
            <div class="card auth-card shadow">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold mb-0">Admin Panel</h4>
                        <button class="btn btn-outline-secondary btn-sm fw-bold" onclick="logout()">Logout</button>
                    </div>
                    <h6 class="text-muted mb-3">User Management</h6>
                    <div id="userList"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const ADMIN_USERNAME = 'admin';
    const STORAGE_KEY = 'whatlogs_users';
    let hashedStorage = "";
    let autoTimer;
    let adminPasswordHash = "";

    // Pre-compute admin password hash on load
    sha256('admin').then(h => { adminPasswordHash = h; });

    function getUsers() {
        try {
            return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
        } catch {
            return [];
        }
    }

    function saveUsers(users) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(users));
    }

    async function sha256(str) {
        const buf = new TextEncoder().encode(str);
        const hashBuf = await crypto.subtle.digest('SHA-256', buf);
        return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function generateCaptcha() {
        const chars = "23456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
        let rawText = "";
        for (let i = 0; i < 6; i++) {
            rawText += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        hashedStorage = await sha256(rawText);
        drawCaptcha(rawText);
        clearTimeout(autoTimer);
        autoTimer = setTimeout(generateCaptcha, 60000);
    }

    function drawCaptcha(text) {
        const canvas = document.getElementById("captchaCanvas");
        const ctx = canvas.getContext("2d");

        // 1. Background - Vibrant Pastel
        const hue = Math.floor(Math.random() * 360);
        ctx.fillStyle = `hsl(${hue}, 60%, 92%)`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Cross Lines - Random colors
        for (let i = 0; i < 4; i++) {
            ctx.strokeStyle = `hsl(${Math.random() * 360}, 50%, 60%)`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
            ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
            ctx.stroke();
        }

        // 3. Draw Text with light blur
        const fonts = ["bold 30px 'Courier New'", "italic 28px Georgia", "bold 32px monospace"];
        for (let i = 0; i < text.length; i++) {
            ctx.filter = `blur(${0.5 + Math.random() * 0.3}px)`;
            ctx.font = fonts[Math.floor(Math.random() * fonts.length)];
            ctx.fillStyle = `hsl(${Math.random() * 360}, 70%, 25%)`;
            const x = 20 + (i * 30);
            const y = 40 + (Math.random() * 8 - 4);
            const angle = (Math.random() * 0.3) - 0.15;
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillText(text[i], 0, 0);
            ctx.restore();
            ctx.filter = 'none';
        }

        // 4. Fine Noise
        for (let i = 0; i < 30; i++) {
            ctx.fillStyle = `rgba(0,0,0,0.1)`;
            ctx.beginPath();
            ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function showTab(tab) {
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        if (tab === 'login') {
            loginForm.style.display = '';
            signupForm.style.display = 'none';
            loginTab.classList.add('active');
            signupTab.classList.remove('active');
        } else {
            loginForm.style.display = 'none';
            signupForm.style.display = '';
            loginTab.classList.remove('active');
            signupTab.classList.add('active');
        }
    }

    function logout() {
        document.getElementById('authPanel').style.display = '';
        document.getElementById('welcomePanel').style.display = 'none';
        document.getElementById('adminPanel').style.display = 'none';
        document.getElementById('loginForm').reset();
        document.getElementById('loginFeedback').innerText = '';
        generateCaptcha();
    }

    function escapeHtml(str) {
        return str
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function renderAdminPanel() {
        const users = getUsers();
        const userList = document.getElementById('userList');
        if (users.length === 0) {
            userList.innerHTML = '<p class="text-muted text-center">No registered users yet.</p>';
            return;
        }
        userList.innerHTML = `
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Username</th>
                        <th class="text-center">Status</th>
                        <th class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody>
                    ${users.map(u => `
                        <tr>
                            <td>${escapeHtml(u.username)}</td>
                            <td class="text-center">
                                ${u.active
                                    ? '<span class="badge bg-success">Active</span>'
                                    : '<span class="badge bg-secondary">Frozen</span>'}
                            </td>
                            <td class="text-center">
                                ${u.active
                                    ? `<button class="btn btn-sm btn-warning fw-bold" onclick="toggleUser('${escapeHtml(u.username)}', false)">Freeze</button>`
                                    : `<button class="btn btn-sm btn-success fw-bold" onclick="toggleUser('${escapeHtml(u.username)}', true)">Activate</button>`}
                            </td>
                        </tr>
                    `).join('')}
                </tbody>
            </table>`;
    }

    function toggleUser(username, active) {
        const users = getUsers();
        const user = users.find(u => u.username === username);
        if (user) {
            user.active = active;
            saveUsers(users);
            renderAdminPanel();
        }
    }

    // Login: verify captcha then authenticate via localStorage
    document.getElementById("loginForm").onsubmit = async function(e) {
        e.preventDefault();
        const userInput = document.getElementById("captchaInput").value;
        const userHashed = await sha256(userInput);
        const feedback = document.getElementById("loginFeedback");

        if (userHashed !== hashedStorage) {
            feedback.innerText = "CAPTCHA FAILED: Try Again.";
            feedback.className = "text-danger text-center mt-3 fw-bold";
            generateCaptcha();
            document.getElementById("captchaInput").value = "";
            return;
        }

        const username = document.getElementById("loginUsername").value.trim();
        const password = document.getElementById("loginPassword").value;
        const passwordHash = await sha256(password);

        // Admin login check
        if (username === ADMIN_USERNAME) {
            if (passwordHash === adminPasswordHash) {
                document.getElementById('authPanel').style.display = 'none';
                document.getElementById('adminPanel').style.display = '';
                renderAdminPanel();
            } else {
                feedback.innerText = "FAILED: Invalid username or password.";
                feedback.className = "text-danger text-center mt-3 fw-bold";
                generateCaptcha();
                document.getElementById("captchaInput").value = "";
            }
            return;
        }

        // Regular user login
        const users = getUsers();
        const user = users.find(u => u.username === username);
        if (!user || user.passwordHash !== passwordHash) {
            feedback.innerText = "FAILED: Invalid username or password.";
            feedback.className = "text-danger text-center mt-3 fw-bold";
            generateCaptcha();
            document.getElementById("captchaInput").value = "";
            return;
        }
        if (!user.active) {
            feedback.innerText = "FAILED: Your account has been frozen. Please contact admin.";
            feedback.className = "text-danger text-center mt-3 fw-bold";
            generateCaptcha();
            document.getElementById("captchaInput").value = "";
            return;
        }

        // Successful user login
        document.getElementById('authPanel').style.display = 'none';
        document.getElementById('welcomeUsername').innerText = username;
        document.getElementById('welcomePanel').style.display = '';
    };

    // Signup: store hashed password in localStorage
    document.getElementById("signupForm").onsubmit = async function(e) {
        e.preventDefault();
        const feedback = document.getElementById("signupFeedback");
        const username = document.getElementById("signupUsername").value.trim();
        const password = document.getElementById("signupPassword").value;
        const confirm = document.getElementById("signupConfirm").value;

        if (username === ADMIN_USERNAME) {
            feedback.innerText = "FAILED: This username is reserved.";
            feedback.className = "text-danger text-center mt-3 fw-bold";
            return;
        }

        if (password !== confirm) {
            feedback.innerText = "Passwords do not match.";
            feedback.className = "text-danger text-center mt-3 fw-bold";
            return;
        }

        const users = getUsers();
        if (users.find(u => u.username === username)) {
            feedback.innerText = "FAILED: Username already exists.";
            feedback.className = "text-danger text-center mt-3 fw-bold";
            return;
        }

        const passwordHash = await sha256(password);
        users.push({ username, passwordHash, active: true });
        saveUsers(users);

        feedback.innerText = "SUCCESS: Account created. You can now login.";
        feedback.className = "text-success text-center mt-3 fw-bold";
        document.getElementById("signupForm").reset();
    };

    window.onload = generateCaptcha;
</script>

</body>
</html>
