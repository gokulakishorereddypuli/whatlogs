<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balanced Security Captcha</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }
        body {
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .container { width: 100%; max-width: 400px; padding: 16px; }
        .card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.12);
            padding: 32px;
        }
        h4 { text-align: center; margin: 0 0 24px; font-weight: 700; font-size: 1.25rem; }
        .mb { margin-bottom: 16px; }
        .form-label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.8rem;
            font-weight: 700;
            color: #6c757d;
        }
        input[type="text"] {
            width: 100%;
            padding: 8px 12px;
            font-size: 1rem;
            border: 1px solid #ced4da;
            border-radius: 6px;
            outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus { border-color: #0d6efd; }
        .canvas-box {
            background: #fff;
            padding: 8px;
            border: 2px solid #ced4da;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 8px;
            overflow: hidden;
        }
        #captchaCanvas { border-radius: 4px; flex: 1; min-width: 0; max-width: calc(100% - 48px); display: block; }
        .refresh-btn { cursor: pointer; color: #0d6efd; font-size: 1.5rem; transition: transform 0.3s, color 0.3s; flex-shrink: 0; white-space: nowrap; padding: 0 8px; border: none; background: none; }
        .refresh-btn:hover { color: #0a58ca; transform: rotate(90deg); }
        #captchaInput { font-size: 1.125rem; text-align: center; }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            background: #0d6efd;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:hover { background: #0a58ca; }
        #feedback { text-align: center; margin-top: 12px; font-size: 0.875rem; font-weight: 700; }
        .text-success { color: #198754; }
        .text-danger { color: #dc3545; }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h4>Secure Access</h4>
        <form id="captchaForm">
            <div class="mb">
                <input type="text" placeholder="Email Address" required>
            </div>

            <div class="mb">
                <label class="form-label">Verify Identity</label>
                <div class="canvas-box">
                    <canvas id="captchaCanvas" width="200" height="60"></canvas>
                    <button type="button" class="refresh-btn" id="refreshBtn" title="Refresh Code">&#x21bb;</button>
                </div>
                <input type="text" id="captchaInput"
                       placeholder="Enter the code" maxlength="6" autocomplete="off" required>
            </div>

            <button type="submit" class="btn">Sign In</button>
            <div id="feedback"></div>
        </form>
    </div>
</div>

<script>
    let hashedStorage = "";
    let autoTimer;

    // Standard SHA-256 Hashing for Client-Side Security
    async function sha256(str) {
        const buf = new TextEncoder().encode(str);
        const hashBuf = await crypto.subtle.digest('SHA-256', buf);
        return Array.from(new Uint8Array(hashBuf)).map(b => b.toString(16).padStart(2, '0')).join('');
    }

    async function generateCaptcha() {
        const chars = "23456789ABCDEFGHJKLMNPQRSTUVWXYZabcdefghijkmnopqrstuvwxyz";
        let rawText = "";
        for (let i = 0; i < 6; i++) {
            rawText += chars.charAt(Math.floor(Math.random() * chars.length));
        }

        hashedStorage = await sha256(rawText);
        drawCaptcha(rawText);

        // Auto-refresh logic (60 seconds)
        clearTimeout(autoTimer);
        autoTimer = setTimeout(generateCaptcha, 60000);
    }

    function drawCaptcha(text) {
        const canvas = document.getElementById("captchaCanvas");
        const ctx = canvas.getContext("2d");

        // 1. Background - Vibrant Pastel
        const hue = Math.floor(Math.random() * 360);
        ctx.fillStyle = `hsl(${hue}, 60%, 92%)`;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. Cross Lines - Random colors
        for (let i = 0; i < 4; i++) {
            ctx.strokeStyle = `hsl(${Math.random() * 360}, 50%, 60%)`;
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(Math.random() * canvas.width, Math.random() * canvas.height);
            ctx.lineTo(Math.random() * canvas.width, Math.random() * canvas.height);
            ctx.stroke();
        }

        // 3. Draw Text with LIGHT BLUR (Reduced from 1.2px to 0.6px)
        const fonts = ["bold 30px 'Courier New'", "italic 28px Georgia", "bold 32px monospace"];
        
        for (let i = 0; i < text.length; i++) {
            // APPLYING REDUCED BLUR HERE
            ctx.filter = `blur(${0.5 + Math.random() * 0.3}px)`; 
            
            ctx.font = fonts[Math.floor(Math.random() * fonts.length)];
            ctx.fillStyle = `hsl(${Math.random() * 360}, 70%, 25%)`; // Darker text for readability
            
            const x = 20 + (i * 30);
            const y = 40 + (Math.random() * 8 - 4);
            const angle = (Math.random() * 0.3) - 0.15;

            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(angle);
            ctx.fillText(text[i], 0, 0);
            ctx.restore();
            
            ctx.filter = 'none'; // Ensure lines and dots aren't overly blurred
        }

        // 4. Fine Noise
        for (let i = 0; i < 30; i++) {
            ctx.fillStyle = `rgba(0,0,0,0.1)`;
            ctx.beginPath();
            ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, 1, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    document.getElementById("captchaForm").onsubmit = async function(e) {
        e.preventDefault();
        const userInput = document.getElementById("captchaInput").value;
        const userHashed = await sha256(userInput);
        const feedback = document.getElementById("feedback");

        if (userHashed === hashedStorage) {
            feedback.innerText = "SUCCESS: Verified!";
            feedback.className = "text-success";
            // Proceed to backend...
        } else {
            feedback.innerText = "FAILED: Try Again.";
            feedback.className = "text-danger";
            generateCaptcha();
            document.getElementById("captchaInput").value = "";
        }
    };

    window.onload = generateCaptcha;
    document.getElementById("refreshBtn").addEventListener("click", generateCaptcha);
</script>

</body>
</html>
